name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'stable'

    - name: Install dependencies
      run: flutter pub get
      working-directory: flutter_app

    - name: Analyze
      run: flutter analyze
      working-directory: flutter_app

    - name: Run tests
      run: |
        if [ -d "flutter_app/test" ]; then
          flutter test
        else
          echo "No Flutter tests found, skipping"
        fi
      working-directory: flutter_app
