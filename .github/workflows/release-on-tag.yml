name: Create Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create archive of repository
      run: |
        ZIP_NAME=ai-student-recommender-${{ github.ref_name }}.zip
        echo "Creating $ZIP_NAME"
        zip -r "$ZIP_NAME" . -x .git/* .github/workflows/* || true
        echo "ZIP created: $ZIP_NAME"
      shell: bash

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body: |
          Automated release generated by workflow for tag ${{ github.ref_name }}.
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./ai-student-recommender-${{ github.ref_name }}.zip
        asset_name: ai-student-recommender-${{ github.ref_name }}.zip
        asset_content_type: application/zip
