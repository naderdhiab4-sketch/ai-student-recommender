version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recommender
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ml_service:
    build: ./ml_service
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data

  backend:
    build: ./backend
    ports:
      - "8000:80"
    environment:
      - CONNECTION_STRING=Host=postgres;Database=recommender;Username=postgres;Password=postgres
    depends_on:
      - postgres
      - ml_service

volumes:
  pgdata:
