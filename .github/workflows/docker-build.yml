name: Dockerfile Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build ml_service image
      run: |
        docker build --file ml_service/Dockerfile --tag check-ml-service:latest . || echo "ml_service build may fail in CI due to heavy packages"

    - name: Build backend image
      run: |
        if [ -f "backend/Dockerfile" ]; then
          docker build --file backend/Dockerfile --tag check-backend:latest . || echo "backend build skipped or failed"
        else
          echo "No backend Dockerfile"
        fi
